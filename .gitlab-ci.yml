stages:
  - prepare
  - build_osvvm
  - build_poc
  - test
  - documentation
  - pages

variables:
  GIT_SUBMODULE_STRATEGY: recursive
  SIMULATOR_PAGES: "NVC"  # simulator from which the results should be published on GitLab pages (GHDL, Riviera-PRO)

Scripts:
  stage: prepare
  image: ${CI_REGISTRY}/docker-images/base-image:alpine
  script:
    - mv src/common/my_project.vhdl.template tb/common/my_project.vhdl  # use CopyFile when its supporting renaming
    - sed -i 's#\(constant\sMY_PROJECT_DIR\s*:\s*string\s*:=\s*\)".*";#\1"'"$(pwd)"'";#' tb/common/my_project.vhdl
  artifacts:
    paths:
      - tb/common/my_project.vhdl
    expire_in: 1 hour


# --------------------
# ---- Templates -----
# --------------------
.run:
  script:
    - |
      if [ "$SIMULATOR" = "NVC" ]; then
        CreateAndChangeDirectory "temp/NVC" "Simulation working directory"
        # before_script and script are running in the same shell; therefore no need to change the directory
        nvc --do ../../regression.tcl
      else
        exec-$SIMULATOR.sh -n --tcl-file=regression.tcl
      fi
  after_script:
    - mkdir -p temp/junit
    - CopyFile "temp/$SIMULATOR/*/*.xml" "temp/junit"
    - CopyFile "temp/$SIMULATOR/*/*.yml" "temp/junit"
  artifacts:
    paths:
      - temp/$SIMULATOR
      - temp/junit
      - lib/osvvm/*_generated.vhd
    reports:
      junit: "temp/junit/*.xml"
    expire_in: 1 week
    when: always

# ---------------
# ---- GHDL -----
# ---------------
.GHDL:
  parallel:
    matrix:
      - GHDL_BACKEND: ["llvm", "mcode"]
  image: ${CI_REGISTRY}/docker-images/ghdl:${GHDL_BACKEND}
  extends:
    - .run
  variables:
    SIMULATOR: "GHDL"

GHDL_OSVVM_run:
  stage: build_osvvm
  extends:
    - .GHDL
  needs:
    job: Scripts
    artifacts: true
  variables:
    REGRESSION_STEP: "osvvm"

GHDL_PoC_run:
  stage: build_poc
  extends:
    - .GHDL
  needs:
    - job: Scripts
      artifacts: true
    - job: GHDL_OSVVM_run
      artifacts: true
  variables:
    REGRESSION_STEP: "poc"

.GHDL_OSVVM_sim:  # step has to be added to regression.tcl
  stage: test
  extends:
    - .GHDL
  needs:
    - job: Scripts
      artifacts: true
    - job: GHDL_OSVVM_run
      artifacts: true
  only:
    - main
    - master
    - dev
  variables:
    REGRESSION_STEP: "osvvm_test"  # todo: add this to regression.tcl

GHDL_PoC_sim:
  stage: test
  extends:
    - .GHDL
  needs:
    - job: Scripts
      artifacts: true
    - job: GHDL_PoC_run
      artifacts: true
  allow_failure: true  # todo: fix llvm error
  variables:
    REGRESSION_STEP: "test"

# ------------------
# ---- Riviera -----
# ------------------
.RIVIERA-PRO:
  image: ${CI_REGISTRY}/docker-images/rivierapro:2024.10
  extends:
    - .run
  variables:
    SIMULATOR: "Riviera-PRO"

RIVIERA_OSVVM_run:
  stage: build_osvvm
  extends:
    - .RIVIERA-PRO
  needs:
    job: Scripts
    artifacts: true
  variables:
    REGRESSION_STEP: "osvvm"

RIVIERA_PoC_run:
  stage: build_poc
  extends:
    - .RIVIERA-PRO
  needs:
    - job: Scripts
      artifacts: true
    - job: RIVIERA_OSVVM_run
      artifacts: true
  variables:
    REGRESSION_STEP: "poc"

.RIVIERA_OSVVM_sim:
  stage: test
  extends:
    - .RIVIERA-PRO
  needs:
    - job: Scripts
      artifacts: true
    - job: RIVIERA_OSVVM_run
      artifacts: true
    - job: RIVIERA_PoC_run  # avoid license blocking
      artifacts: true
  only:
    - main
    - master
    - dev
  allow_failure: true
  variables:
    REGRESSION_STEP: "osvvm_test"

RIVIERA_PoC_sim:
  stage: test
  extends:
    - .RIVIERA-PRO
  needs:
    - job: Scripts
      artifacts: true
    - job: RIVIERA_PoC_run
      artifacts: true
    - job: RIVIERA_OSVVM_sim  # avoid license blocking
      optional: true
      artifacts: false
  allow_failure: true  # if license is in use
  variables:
    REGRESSION_STEP: "test"


# --------------
# ---- NVC -----
# --------------
.NVC:
  image: ${CI_REGISTRY}/docker-images/nvc:latest
  extends:
    - .run
  variables:
    SIMULATOR: "NVC"

NVC_OSVVM_run:
  stage: build_osvvm
  extends:
    - .NVC
  needs:
    job: Scripts
    artifacts: true
  variables:
    REGRESSION_STEP: "osvvm"

NVC_PoC_run:
  stage: build_poc
  extends:
    - .NVC
  needs:
    - job: Scripts
      artifacts: true
    - job: NVC_OSVVM_run
      artifacts: true
  variables:
    REGRESSION_STEP: "poc"

.NVC_OSVVM_sim:
  stage: test
  extends:
    - .NVC
  needs:
    - job: Scripts
      artifacts:
    - job: NVC_OSVVM_run
      artifacts: true
  only:
    - main
    - master
    - dev
  variables:
    REGRESSION_STEP: "osvvm_test"

NVC_PoC_sim:
  stage: test
  extends:
    - .NVC
  needs:
    - job: Scripts
      artifacts: true
    - job: NVC_PoC_run
      artifacts: true
  variables:
    REGRESSION_STEP: "test"


# --------------------------
# ----- Documentation ------
# --------------------------
MergeReports:
  image: ${CI_REGISTRY}/docker-images/base-image:alpine
  stage: documentation
  needs:
    - job: GHDL_PoC_sim
      artifacts: true
    - job: RIVIERA_PoC_sim
      artifacts: true
    - job: NVC_PoC_sim
      artifacts: true
  before_script:
    - pip install pyEDAA.Reports
  script:
    - mkdir -p report/unit
    - pyedaa-reports -v unittest "--merge=Any-JUnit:temp/junit/*.xml" "--output=pyTest-JUnit:report/unit/unittest.xml"
    - mv temp/junit/${SIMULATOR_PAGES}-PoC.yml report/unit/osvvmreport.yml
  artifacts:
    paths:
      - report/unit

Sphinx:
  image: ${CI_REGISTRY}/docker-images/base-image:alpine
  stage: documentation
  needs:
    - job: MergeReports
      artifacts: true
  parallel:
    matrix:
      - SPHINX_BUILDER: ["html", "latex"]
  before_script:
    - pip install -U -r docs/requirements.txt
  script:
    - cd docs
    - sphinx-build --verbose --builder ${SPHINX_BUILDER} -d _build/doctrees --jobs 4 -w _build/${SPHINX_BUILDER}.log . _build/${SPHINX_BUILDER}
  artifacts:
    paths:
      - docs/_build/${SPHINX_BUILDER}

MikTeX:
  image: ${CI_REGISTRY}/docker-images/miktex:sphinx
  needs:
    - job: Sphinx
      parallel:
        matrix:
          - SPHINX_BUILDER: "latex"
      artifacts: true
  stage: documentation
  script:
    - cd docs/_build/latex
    - exec-LaTeX.sh --xelatex "PoC.tex"
  after_script:
    - CopyFile docs/_build/latex/PoC.pdf .
  artifacts:
    paths:
      - ./*.pdf
  allow_failure: true


# ------------------
# ----- Pages ------
# ------------------
.pages:
  image: ${CI_REGISTRY}/docker-images/base-image:alpine
  stage: pages
  variables:
    GIT_SUBMODULE_STRATEGY: normal
  pages: true
  before_script:
    - apk update
    - apk add tree
  script:
    - CopyDir docs/_build/html       public
    #- CopyFile PoC.pdf  public
    - tree public
  after_script:
    - echo "Pages accessible at ${CI_PAGES_URL}"
  artifacts:
    paths:
      - public


pagesGHDL:
  rules:
    - if: >
        $SIMULATOR_PAGES == "GHDL" &&
        $CI_PIPELINE_SOURCE == "push" &&
        $CI_COMMIT_BRANCH =~ /^(main|master|dev)$/
  needs:
    - job: GHDL_OSVVM_sim  # main only
      artifacts: true
      optional: true
    - job: GHDL_PoC_sim
      artifacts: true
      optional: true
  extends:
    - .pages

pagesRiviera:
  rules:
    - if: >
        $SIMULATOR_PAGES == "Riviera-PRO" &&
        $CI_PIPELINE_SOURCE == "push" &&
        $CI_COMMIT_BRANCH =~ /^(main|master|dev)$/
  needs:
    - job: RIVIERA_PoC_sim  # inherits artifacts from previous jobs
      artifacts: true
      optional: true
  extends:
    - .pages

pagesNVC:
  extends:
    - .pages
  rules:
    - if: >
        $SIMULATOR_PAGES == "NVC" &&
        $CI_PIPELINE_SOURCE == "push"
  needs:
    - job: NVC_OSVVM_sim
      artifacts: true
      optional: true
    - job: NVC_PoC_sim
      artifacts: true
      optional: true
    - job: Sphinx
      artifacts: true
